[build]
builder = "nixpacks"
buildCommand = "npx prisma generate"

[deploy]
startCommand = "(npx prisma migrate resolve --applied \"0_init\" 2>/dev/null || true) && npx prisma migrate deploy && node api/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
numReplicas = 1
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
